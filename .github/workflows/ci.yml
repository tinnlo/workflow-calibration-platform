name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Debug after root install
        run: |
          echo "root node_modules count: $(ls node_modules | wc -l)"
          ls node_modules/react 2>/dev/null && echo "react OK" || echo "react MISSING after root install"

      - name: Install server dependencies
        run: npm ci
        working-directory: server
        env:
          NODE_ENV: development

      - name: Debug after server install
        run: |
          echo "root node_modules count: $(ls node_modules | wc -l)"
          ls node_modules/react 2>/dev/null && echo "react OK" || echo "react MISSING after server install"
          ls node_modules/@types/react/index.d.ts 2>/dev/null && echo "@types/react OK" || echo "@types/react MISSING"

      - name: Sanitization check
        run: |
          echo "Checking for banned proprietary terms..."
          if grep -rI --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" \
            -f .github/banned-terms.txt \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=.git \
            .; then
            echo "FAIL: Banned proprietary terms found in source."
            exit 1
          else
            echo "PASS: No banned terms found."
          fi

      - name: Typecheck (frontend)
        run: npm run typecheck

      - name: Typecheck (backend)
        run: npm run typecheck
        working-directory: server

      - name: Lint (frontend)
        run: npm run lint

      - name: Test (frontend)
        run: npm test

      - name: Test (backend)
        run: npm test
        working-directory: server

      - name: Build (frontend)
        run: npm run build

      - name: Build (backend)
        run: npm run build
        working-directory: server
